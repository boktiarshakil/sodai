name: Daily Grocery Scrape

on:
  schedule:
    # Run daily at 06:00 UTC (12:00 PM Bangladesh time)
    - cron: '0 6 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python chaldal_scraper.py Grocery.json
          cp Grocery.json docs/Grocery.json

      - name: Commit and push changes
        run: |
          git config user.name "sodai-bot"
          git config user.email "sodai-bot@users.noreply.github.com"
          git add Grocery.json docs/Grocery.json
          if ! git diff --staged --quiet; then
            MSG=$(python3 -c "
import json
d = json.load(open('Grocery.json'))
m = d['_meta']
print(f'Daily scrape: {d[\"fetched_at\"][:10]} - {m[\"total_products\"]} products, {m[\"leaf_categories\"]} categories')
")
            git commit -m "$MSG"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

  deploy:
    needs: scrape
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
